name: Refresh market baseline

on:
  workflow_dispatch:
  schedule:
    - cron: "47 17 * * *"

permissions:
  contents: write

concurrency:
  group: refresh-market-baseline
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh poe2scout snapshot
        run: npm run update:poe2scout

      - name: Write static market baseline
        run: npm run update:market-baseline

      - name: Test
        run: npm test

      - name: Commit baseline
        run: |
          if git diff --quiet -- public/market-baseline.json; then
            echo "Market baseline unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/market-baseline.json
          git commit -m "chore: refresh market baseline"
          git push
